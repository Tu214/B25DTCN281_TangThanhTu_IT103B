<script>
    const players = [
        "Messi - Forward - 25 - 15 - 34",
        "Ronaldo - Forward - 30 - 10 - 38",
        "Neymar - Forward - 18 - 20 - 32",
        "De Bruyne - Midfielder - 8 - 25 - 35",
        "Kante - Midfielder - 2 - 5 - 36",
        "Van Dijk - Defender - 5 - 3 - 33",
        "Alisson - Goalkeeper - 0 - 1 - 37"
    ];

    function reportByPosition(playersArray) {
        console.log("BÁO CÁO HIỆU SUẤT THEO VỊ TRÍ");

        let positions = [];
        playersArray.forEach(player => {
            let pos = player.split(" - ")[1];
            if (!positions.includes(pos)) {
                positions.push(pos);
            }
        });

        let teamTotalGoals = 0;

        positions.forEach(currentPos => {
            let count = 0;
            let totalGoals = 0;
            let totalAssists = 0;
            let totalMatches = 0;
            playersArray.forEach(player => {
                let parts = player.split(" - ");
                if (parts[1] === currentPos) {
                    count++;
                    totalGoals += Number(parts[2]);
                    totalAssists += Number(parts[3]);
                    totalMatches += Number(parts[4]);
                }
            });

            let performance = ((totalGoals + totalAssists) / totalMatches).toFixed(2);

            console.log(`\n${currentPos}:`);
            console.log(`- Số cầu thủ: ${count}`);
            console.log(`- Tổng bàn thắng: ${totalGoals}`);
            console.log(`- Tổng kiến tạo: ${totalAssists}`);
            console.log(`- Tổng số trận: ${totalMatches}`);
            console.log(`- Trung bình hiệu suất/trận: ${performance}`);

            teamTotalGoals += totalGoals;
        });

        console.log("\n------------------------");
        console.log(`Tổng bàn thắng toàn đội : ${teamTotalGoals}`);
    }

    reportByPosition(players);
</script>
