<script>
    const playerNames = ['messi', 'ronaldo', 'neyma', 'de bruyne', 'kante', 'van dijk', 'alission']

    function getUpperNames(playerNames) {
        let result = playerNames.map(function (name) {
            return name.toUpperCase();
        });
        return result;
    }
    let upperPlayers = getUpperNames(playerNames);

    console.log(upperPlayers);

</script>
