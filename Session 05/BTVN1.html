<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = [];
        let books = +prompt("Bạn muốn trả bao nhiêu cuốn sách:");
        for (let i = 0; i < books; i++) {
            let nameBook = arr.push(prompt(`Nhập tên sách cuốn thứ ${i + 1}:`));
        }
        console.log(`Tổng số sách đã đucợ trả: ${books}`);
        console.log("Danh sách đã trả:");
        for (let j = 0; j < arr.length; j++) {
            console.log(`${j + 1}. ${arr[j]}`);
        }
        
    </script>
</body>
</html>
