<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list">
        <!-- danh sách -->
    </ul>
    <form id="product-form">
        <input type="text" id="product-name" placeholder="Ten san phẩm">
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit" onclick="handleAddProduct(event)">Thêm Sản Phẩm</button>
    </form>

    <script>
        let products = [
            { id: 1, name: "Bánh Chưng", price: 150000 },
            { id: 2, name: "Giò Lụa", price: 180000 },
            { id: 3, name: "Cành Đào", price: 500000 },
            { id: 4, name: "Mứt Tet", price: 120000 },
            { id: 5, name: "Bao Lì Xì", price: 25000 },
            { id: 6, name: "Dưa Hấu Tết", price: 80000 },
        ];

        function renderProduct() {
            let productListElement = document.getElementById('product-list')
            productListElement.innerHTML = ""; // xoá trắng trước khi hiển thị lại
            products.forEach((products, index, array) => {
                productListElement.innerHTML += `
            <li>
                <div class="product">
                    <p>Tên sản phẩm:${products.name}</p>
                    <p>Giá sản phẩm:${products.price}</p>
                    <button class="edit-price-btn" onclick = "handleUppdateProduct(${products.id})">Sửa giá</button>
                    <button onclick = "handleDeleteProduct(${products.id})">Xoá</button>
                </div>
            </li>`
            })
        }
        renderProduct()

        function handleAddProduct(event) {
            event.preventDefault();
            let nameInputElement = document.getElementById("product-name")
            let priceInputElement = document.getElementById("product-price")
            let newProductName = nameInputElement.value
            let newProductPrice = +priceInputElement.value

            let newProduct = {
                id: products.length != 0 ? products[products.length - 1].id + 1 : 1, // nếu độ mảng khác 0 lấy id cuối cùng cộng 1, nếu độ dài mảng bằng 0 id = 1
                name: newProductName,
                price: newProductPrice
            }
            products.push(newProduct)
            renderProduct();
        }

        function handleDeleteProduct(id) {
            products = products.filter(product => product.id !== id)
            renderProduct();
        }

        function handleUppdateProduct(id) {
          
            let productIndex = products.findIndex(p => p.id === id);

            if (productIndex !== -1) {
                let oldName = products[productIndex].name;
                let oldPrice = products[productIndex].price;

                let newName = prompt("Nhập tên mới cho sản phẩm:", oldName);

                if (newName === null) return;

                let newPriceRaw = prompt("Nhập giá mới cho sản phẩm:", oldPrice);
                if (newPriceRaw === null) return;

                let newPrice = Number(newPriceRaw);

                products[productIndex].name = newName.trim() || oldName;
                products[productIndex].price = isNaN(newPrice) ? oldPrice : newPrice;

                renderProduct();
            }
        }

        
    </script>
</body>

</html>
