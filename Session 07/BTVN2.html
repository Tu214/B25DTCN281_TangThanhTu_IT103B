<script>
    let playerIds = ["P001", "P002", "P003", "P004", "P005"];
    let playerNames = [
        "Nguyễn Văn A",
        "Trần Thị B",
        "Lê Văn C",
        "Phạm Văn D",
        "Hoàng Thị E"
    ];
    let playerJerseyNumbers = [10, 7, 8, 9, 11];

    function printTeamRoster() {
        console.log("\n--- DANH SÁCH ĐỘI BÓNG HIỆN TẠI ---");
        for (let i = 0; i < playerIds.length; i++) {
            console.log(`${i + 1}. Mã: ${playerIds[i]} - Tên: ${playerNames[i]} - Số áo: ${playerJerseyNumbers[i]}`);
        }
    }

    function updatePlayerNameAndJersey(playerId, newName, newJerseyNumber) {
        let index = playerIds.indexOf(playerId);

        if (index !== -1) {
            playerNames[index] = newName;
            playerJerseyNumbers[index] = newJerseyNumber;
            return true;
        }

        return false;
    }

    printTeamRoster();

    let targetId = prompt("Nhập mã cầu thủ muốn cập nhật (ví dụ: P001):");

    if (playerIds.includes(targetId)) {
        let nameInput = prompt("Nhập tên mới cho cầu thủ:");

        let jerseyInput;
        while (true) {
            jerseyInput = +prompt("Nhập số áo mới (số nguyên từ 1–99):");
            if (Number.isInteger(jerseyInput) && jerseyInput >= 1 && jerseyInput <= 99) {
                break;
            }
            alert("Số áo không hợp lệ! Vui lòng nhập số nguyên từ 1 đến 99.");
        }

        let isSuccess = updatePlayerNameAndJersey(targetId, nameInput, jerseyInput);

        if (isSuccess) {
            alert("Thông báo: Cập nhật thành công!");
            printTeamRoster();
        }
    } else {
        alert("Thông báo: Không tìm thấy cầu thủ với mã này!");
    }
</script>
