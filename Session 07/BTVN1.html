<script>
    let playerIds = [];
    let playerPositions = [];

    let count = +prompt("Có bao nhiêu cầu thủ cần nhập vào đội bóng?");

    if (count > 0) {
        for (let i = 1; i <= count; i++) {
            let id;
            while (true) {
                id = prompt(`Nhập mã cầu thủ thứ ${i}:`).trim();
                if (id === "") {
                    alert("Mã cầu thủ không được để trống!");
                } else if (playerIds.includes(id)) {
                    alert(`Mã cầu thủ '${id}' đã tồn tại!`);
                } else {
                    break;
                }
            }

            let posChoice;
            let posName = "";
            while (true) {
                posChoice = +prompt(`Vị trí (1: Thủ môn, 2: Hậu vệ, 3: Tiền vệ, 4: Tiền đạo):`);
                if (posChoice === 1) { posName = "Thủ môn"; break; }
                if (posChoice === 2) { posName = "Hậu vệ"; break; }
                if (posChoice === 3) { posName = "Tiền vệ"; break; }
                if (posChoice === 4) { posName = "Tiền đạo"; break; }
                alert("Vui lòng chọn từ 1 đến 4!");
            }

            playerIds.push(id);
            playerPositions.push(posName);
        }

        function printTeamRoster() {
            console.log(`\nĐội bóng hiện tại (${playerIds.length} cầu thủ):`);
            for (let i = 0; i < playerIds.length; i++) {
                console.log(`${i + 1}. ${playerIds[i]} - ${playerPositions[i]}`);
            }
        }

        function findPlayersByPosition(position) {
            let indices = [];
            for (let i = 0; i < playerPositions.length; i++) {
                if (playerPositions[i] === position) {
                    indices.push(i);
                }
            }
            return indices;
        }

        printTeamRoster();

        let searchPosChoice = +prompt("Nhập vị trí cầu thủ muốn đếm số lượng (1: Thủ môn, 2: Hậu vệ, 3: Tiền vệ, 4: Tiền đạo):");
        let searchPosName = "";
        if (searchPosChoice === 1) searchPosName = "Thủ môn";
        else if (searchPosChoice === 2) searchPosName = "Hậu vệ";
        else if (searchPosChoice === 3) searchPosName = "Tiền vệ";
        else if (searchPosChoice === 4) searchPosName = "Tiền đạo";

        if (searchPosName !== "") {
            let resultIndices = findPlayersByPosition(searchPosName);
            console.log(`\nSố cầu thủ ở vị trí ${searchPosName}: ${resultIndices.length}`);
            console.log(`Các chỉ số cầu thủ ở vị trí ${searchPosName}: ${resultIndices.join(", ")}`);
        }

    } else {
        console.log("Số lượng cầu thủ không hợp lệ.");
    }
</script>
