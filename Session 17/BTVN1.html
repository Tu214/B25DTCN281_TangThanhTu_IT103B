<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuẩn bị Tết Nguyên Đán</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background-color: #fff8e2;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #d43131;
            color: white;
            text-align: center;
            padding: 25px 10px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        .task-item {
            background-color: #fff;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid #ec8108;
            box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.05);
        }

        .task-name {
            font-weight: 500;
            color: #333;
        }

        .status {
            font-style: italic;
            font-size: 13px;
            color: #888;
        }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #777;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            <h1>Chuẩn bị Tết Nguyên Đán</h1>
            <p>Danh sách việc cần làm</p>
        </div>

        <div class="content" id="todo-container">
        <!-- list -->
        </div>

        <div class="footer">
            Đã lưu vào localStorage lần đầu tiên • Refresh trang để kiểm tra
        </div>
    </div>

    <script>
        const todos = [
            { id: 1, task: "Mua bánh chưng", done: false },
            { id: 2, task: "Dọn nhà đón Tết", done: false },
            { id: 3, task: "Gói bánh chưng", done: false },
            { id: 4, task: "Trang trí nhà cửa", done: false },
        ];
        
        localStorage.setItem("myTodo", JSON.stringify(todos))

        function render() {
            let listElement = document.getElementById("todo-container")
            listElement.innerHTML = "";
            todos.forEach(list => {
               listElement.innerHTML +=`
                <div class="task-item">
                    <span class="task-name">🌸 ${list.task}</span>
                    <span class="status">${list.done === false ? "chưa làm" : "đã hoàn thành"}</span>
                </div>
                `
            })
        }
        render();
    </script>
</body>
</html>
