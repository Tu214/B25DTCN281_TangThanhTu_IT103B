<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Quản Lý Nhân Viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>Quản Lý Nhân Viên</h1>
        </header>

        <section class="form-section">
            <h2 id="formTitle">Thêm Nhân Viên Mới</h2>
            <form id="employeeForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Họ và tên <span class="required">*</span></label>
                        <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên" />
                        <span class="error" id="fullNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="vd: ten@gmail.com" />
                        <span class="error" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="dateOfBirth">Ngày sinh <span class="required">*</span></label>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" />
                        <span class="error" id="dateOfBirthError"></span>
                    </div>

                    <div class="form-group">
                        <label for="position">Chức vụ <span class="required">*</span></label>
                        <select id="position" name="position">
                            <option value="">-- Chọn chức vụ --</option>
                            <option value="Nhân viên">Nhân viên</option>
                            <option value="Trưởng nhóm">Trưởng nhóm</option>
                            <option value="Trưởng phòng">Trưởng phòng</option>
                            <option value="Giám đốc">Giám đốc</option>
                        </select>
                        <span class="error" id="positionError"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn btn-primary">Thêm Nhân Viên</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary" style="display: none;">Hủy</button>
                    <button type="reset" class="btn btn-secondary">Nhập Lại</button>
                </div>
            </form>
        </section>

        <section class="table-section">
            <div class="table-header">
                <h2>Danh Sách Nhân Viên</h2>
                <span class="badge" id="employeeCountBadge">0 nhân viên</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Họ và tên</th>
                            <th>Email</th>
                            <th>Ngày sinh</th>
                            <th>Chức vụ</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                        <!-- Data will be rendered here -->
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="footer">
            <span>Tổng số nhân viên: 3</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
